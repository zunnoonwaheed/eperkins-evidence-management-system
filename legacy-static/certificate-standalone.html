document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"0de2d009-efec-4eed-a0a8-cf2d278b8172\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet>\n  <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n  <style>\n    html, body { margin: 0; padding: 0; }\n    body { background: #f2f6fa; -webkit-font-smoothing: antialiased; }\n    a { text-decoration: none; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh; background:#f2f6fa; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; padding:36px 24px 80px; box-sizing:border-box;\">\n\n  <!-- Top nav tabs -->\n  <div style=\"max-width:1180px; margin:0 auto 22px; display:flex; gap:34px; padding-left:6px;\">\n    <button onclick=\"{{ goCert }}\" style=\"{{ tabCertStyle }}\">Certificate<\u002Fbutton>\n    <button onclick=\"{{ goReplay }}\" style=\"{{ tabReplayStyle }}\">Session Replay<\u002Fbutton>\n    <button onclick=\"{{ goHistory }}\" style=\"{{ tabHistoryStyle }}\">History<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- Card -->\n  <div style=\"max-width:1180px; margin:0 auto; background:#ffffff; border-radius:14px; box-shadow:0 10px 40px rgba(45,66,90,0.06); padding:56px 88px 72px; box-sizing:border-box;\">\n\n    <!-- Header row -->\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-start; gap:32px;\">\n      <div>\n        <h1 style=\"margin:0; font-size:34px; font-weight:700; color:#37414f; line-height:1.15; max-width:560px;\">Certificate of Authenticity for Web Leads<\u002Fh1>\n      <\u002Fdiv>\n      <div style=\"font-size:26px; font-weight:700; color:#37414f; white-space:nowrap; padding-top:2px;\">{{ issuerName }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"font-size:13px; color:#9aa5b4; margin-top:20px;\"><span style=\"font-weight:700; color:#7a869a;\">Certificate ID:<\u002Fspan> {{ certId }}<\u002Fdiv>\n\n    <!-- CERTIFICATE VIEW -->\n    <sc-if value=\"{{ showCert }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n      <p style=\"font-size:15px; color:#9aa5b4; line-height:1.6; margin:40px 0 0; max-width:820px;\">This certificate was issued by {{ issuerName }}, the independent Internet lead certification authority. It certifies the following information about this lead:<\u002Fp>\n\n      <h2 style=\"font-size:26px; font-weight:700; color:#37414f; margin:44px 0 0; padding-bottom:18px; border-bottom:1px solid #edf0f3;\">Session Information :<\u002Fh2>\n\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; row-gap:34px; column-gap:24px; margin-top:34px;\">\n        <div style=\"font-size:14px; color:#9aa5b4;\">Date Of Visit:<\u002Fdiv>\n        <div style=\"font-size:14px; color:#2c3542;\">{{ dateOfVisit }}<\u002Fdiv>\n\n        <div style=\"font-size:14px; color:#9aa5b4;\">Time Of Visit:<\u002Fdiv>\n        <div style=\"font-size:14px; color:#2c3542;\">{{ timeOfVisit }}<\u002Fdiv>\n\n        <div style=\"font-size:14px; color:#9aa5b4;\">Time on page:<\u002Fdiv>\n        <div style=\"font-size:14px; color:#2c3542;\">{{ timeOnPage }}<\u002Fdiv>\n\n        <div style=\"font-size:14px; color:#9aa5b4;\">Page URL:<\u002Fdiv>\n        <div style=\"font-size:14px;\"><a href=\"{{ pageUrl }}\" target=\"_blank\" style=\"color:#2f9bf5;\">{{ pageUrl }}<\u002Fa><\u002Fdiv>\n\n        <div style=\"font-size:14px; color:#9aa5b4;\">Remote IP Address:<\u002Fdiv>\n        <div style=\"font-size:14px; color:#2c3542;\">{{ remoteIp }}<\u002Fdiv>\n\n        <div style=\"font-size:14px; color:#9aa5b4;\">Geo Location (Approximate):<\u002Fdiv>\n        <div style=\"font-size:14px; color:#2c3542; display:flex; align-items:center; gap:8px;\">{{ geoLocation }} <img src=\"{{ flagUrl }}\" alt=\"flag\" style=\"width:20px; height:auto; border-radius:2px; box-shadow:0 0 1px rgba(0,0,0,0.3);\"><\u002Fdiv>\n\n        <div style=\"font-size:14px; color:#9aa5b4;\">Browser:<\u002Fdiv>\n        <div style=\"font-size:14px; color:#2c3542;\">{{ browser }}<\u002Fdiv>\n\n        <div style=\"font-size:14px; color:#9aa5b4;\">OS:<\u002Fdiv>\n        <div style=\"font-size:14px; color:#2c3542;\">{{ os }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <h2 style=\"font-size:26px; font-weight:700; color:#37414f; margin:56px 0 0; padding-bottom:18px; border-bottom:1px solid #edf0f3;\">What did they see?<\u002Fh2>\n\n      <div style=\"display:flex; justify-content:space-between; align-items:center; gap:40px; margin-top:34px;\">\n        <p style=\"font-size:13px; color:#9aa5b4; line-height:1.6; margin:0; max-width:640px;\">{{ issuerName }} records both the web page content viewed by the visitor and the user actions performed on the page, such as form inputs, mouse movements, and clicks. These recorded events are then replayed, providing a session playback that showcases the user's interaction with the page.<\u002Fp>\n        <button onclick=\"{{ goReplay }}\" style=\"background:#46b881; color:#ffffff; border:none; border-radius:6px; padding:13px 22px; font-size:14px; font-weight:600; cursor:pointer; white-space:nowrap; font-family:inherit;\" style-hover=\"background:#3aa876;\">View Session Replay<\u002Fbutton>\n      <\u002Fdiv>\n\n      <h2 style=\"font-size:26px; font-weight:700; color:#37414f; margin:56px 0 0; padding-bottom:18px; border-bottom:1px solid #edf0f3;\">Consent Language<\u002Fh2>\n      <p style=\"font-size:13px; color:#9aa5b4; line-height:1.7; margin:32px 0 0; max-width:960px;\">{{ consentLanguage }}<\u002Fp>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- SESSION REPLAY VIEW -->\n    <sc-if value=\"{{ showReplay }}\" hint-placeholder-val=\"{{ false }}\">\n    <div>\n      <h2 style=\"font-size:26px; font-weight:700; color:#37414f; margin:44px 0 0; padding-bottom:18px; border-bottom:1px solid #edf0f3;\">Session Replay<\u002Fh2>\n      <p style=\"font-size:14px; color:#9aa5b4; line-height:1.6; margin:28px 0 24px; max-width:820px;\">Playback of the recorded visitor session for this lead.<\u002Fp>\n\n      <sc-if value=\"{{ hasVideo }}\" hint-placeholder-val=\"{{ false }}\">\n        <video src=\"{{ videoUrl }}\" controls=\"\" style=\"width:100%; max-width:960px; border-radius:10px; background:#0e1116; display:block;\"><\u002Fvideo>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ noVideo }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"width:100%; max-width:960px; aspect-ratio:16/9; border:2px dashed #cdd6e0; border-radius:10px; background:repeating-linear-gradient(45deg,#f7fafc,#f7fafc 12px,#f1f5f9 12px,#f1f5f9 24px); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;\">\n          <div style=\"font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace; font-size:13px; color:#7a869a;\">session replay video<\u002Fdiv>\n          <div style=\"font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace; font-size:12px; color:#aab4c2;\">set the videoUrl prop to embed the recording<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- HISTORY VIEW -->\n    <sc-if value=\"{{ showHistory }}\" hint-placeholder-val=\"{{ false }}\">\n    <div>\n      <h2 style=\"font-size:26px; font-weight:700; color:#37414f; margin:44px 0 0; padding-bottom:18px; border-bottom:1px solid #edf0f3;\">History<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; row-gap:30px; column-gap:24px; margin-top:34px; max-width:900px;\">\n        <div style=\"font-size:14px; color:#9aa5b4;\">Issued:<\u002Fdiv>\n        <div style=\"font-size:14px; color:#2c3542;\">{{ issuedDateTime }}<\u002Fdiv>\n\n        <div style=\"font-size:14px; color:#9aa5b4;\">Age:<\u002Fdiv>\n        <div style=\"font-size:14px; color:#2c3542;\">{{ age }}<\u002Fdiv>\n\n        <div style=\"font-size:14px; color:#9aa5b4;\">Share Link:<\u002Fdiv>\n        <div style=\"font-size:14px;\"><button onclick=\"{{ copyLink }}\" style=\"background:none; border:none; color:#2f9bf5; font-size:14px; cursor:pointer; padding:0; font-family:inherit;\">{{ copyLabel }}<\u002Fbutton><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: 900 },\n  &quot;certId&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;8f4d3a91-6c2e-4b87-b5f9-2d9c7148ea35&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Certificate&quot; },\n  &quot;issuerName&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Go Verified Leads&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Certificate&quot; },\n  &quot;dateOfVisit&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Fri Jun 26 2026&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Session&quot; },\n  &quot;timeOfVisit&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;17:17:47 GMT+0000 (Coordinated Universal Time)&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Session&quot; },\n  &quot;timeOnPage&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;32 seconds&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Session&quot; },\n  &quot;pageUrl&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;https://www.cacophiney.com&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Session&quot; },\n  &quot;remoteIp&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;73.233.229.15&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Session&quot; },\n  &quot;geoLocation&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Philadelphia , United States&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Session&quot; },\n  &quot;flagUrl&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;https://cdn.ipinfo.io/static/images/countries-flags/US.svg&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Session&quot; },\n  &quot;browser&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Chrome 149.0.0.0&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Session&quot; },\n  &quot;os&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Windows 10 64-bit&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Session&quot; },\n  &quot;consentLanguage&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;By submitting this form and signing up for texts, you consent to receive Tax-US, LLC text messages (e.g. Appointment Setting, Registration reminders, and enrollment information) from Tax-US, LLC at the number provided, including messages sent by autodialer. Message &amp; data rates may apply. Message frequency varies. Unsubscribe at any time by replying STOP or clicking the unsubscribe link (where available). Reply HELP for help. Privacy Policy &amp; Terms and Conditions.&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Certificate&quot; },\n  &quot;issuedDateTime&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Fri Jun 26 2026 17:17:47 GMT+0000 (Coordinated Universal Time)&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;History&quot; },\n  &quot;age&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;8 days, 18 hours, 33 minutes, 16 seconds&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;History&quot; },\n  &quot;videoUrl&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Session Replay&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { tab: 'cert', copied: false };\n\n  renderVals() {\n    const p = this.props;\n    const tab = this.state.tab;\n    const baseTab = { background:'none', border:'none', cursor:'pointer', fontFamily:'inherit', fontSize:'15px', fontWeight:600, padding:'0 0 10px', borderBottom:'2px solid transparent' };\n    const active = { ...baseTab, color:'#2f9bf5', borderBottom:'2px solid #2f9bf5' };\n    const idle = { ...baseTab, color:'#9aa5b4' };\n    const videoUrl = p.videoUrl ?? '';\n    const hasVideo = !!videoUrl;\n\n    return {\n      issuerName: p.issuerName ?? 'Go Verified Leads',\n      certId: p.certId ?? '8f4d3a91-6c2e-4b87-b5f9-2d9c7148ea35',\n      dateOfVisit: p.dateOfVisit ?? 'Fri Jun 26 2026',\n      timeOfVisit: p.timeOfVisit ?? '17:17:47 GMT+0000 (Coordinated Universal Time)',\n      timeOnPage: p.timeOnPage ?? '32 seconds',\n      pageUrl: p.pageUrl ?? 'https://www.cacophiney.com',\n      remoteIp: p.remoteIp ?? '73.233.229.15',\n      geoLocation: p.geoLocation ?? 'Philadelphia , United States',\n      flagUrl: p.flagUrl ?? 'https://cdn.ipinfo.io/static/images/countries-flags/US.svg',\n      browser: p.browser ?? 'Chrome 149.0.0.0',\n      os: p.os ?? 'Windows 10 64-bit',\n      consentLanguage: p.consentLanguage ?? \"By submitting this form and signing up for texts, you consent to receive Tax-US, LLC text messages (e.g. Appointment Setting, Registration reminders, and enrollment information) from Tax-US, LLC at the number provided, including messages sent by autodialer. Message & data rates may apply. Message frequency varies. Unsubscribe at any time by replying STOP or clicking the unsubscribe link (where available). Reply HELP for help. Privacy Policy & Terms and Conditions.\",\n      issuedDateTime: p.issuedDateTime ?? 'Fri Jun 26 2026 17:17:47 GMT+0000 (Coordinated Universal Time)',\n      age: p.age ?? '8 days, 18 hours, 33 minutes, 16 seconds',\n\n      videoUrl,\n      hasVideo,\n      noVideo: !hasVideo,\n\n      showCert: tab === 'cert',\n      showReplay: tab === 'replay',\n      showHistory: tab === 'history',\n\n      tabCertStyle: tab === 'cert' ? active : idle,\n      tabReplayStyle: tab === 'replay' ? active : idle,\n      tabHistoryStyle: tab === 'history' ? active : idle,\n\n      goCert: () => this.setState({ tab: 'cert' }),\n      goReplay: () => this.setState({ tab: 'replay' }),\n      goHistory: () => this.setState({ tab: 'history' }),\n\n      copyLabel: this.state.copied ? 'Copied!' : 'Copy Link',\n      copyLink: () => {\n        try { navigator.clipboard.writeText(window.location.href); } catch (e) {}\n        this.setState({ copied: true });\n        setTimeout(() => this.setState({ copied: false }), 1800);\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
